<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokédex FRLG – Gonna catch 'em all!</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --fr-red: #e63946;
    --lg-green: #2dc653;
    --dark: #1a1a2e;
    --darker: #0f0f1a;
    --card-bg: #16213e;
    --card-border: #0f3460;
    --text: #e0e0f0;
    --muted: #8888aa;
    --accent: #f4d03f;
    --pixel: 'Press Start 2P', monospace;
    --body: 'Nunito', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: var(--text);
    font-family: var(--body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Stars background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 60%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 70%, rgba(255,255,255,0.25) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 2.5rem 1rem 2rem;
    background: linear-gradient(180deg, rgba(230,57,70,0.15) 0%, transparent 100%);
    border-bottom: 2px solid rgba(230,57,70,0.2);
  }

  .logo-title {
    font-family: var(--pixel);
    font-size: clamp(0.7rem, 2.5vw, 1.1rem);
    color: var(--accent);
    letter-spacing: 2px;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.5);
    margin-bottom: 0.4rem;
  }

  .logo-sub {
    font-family: var(--pixel);
    font-size: clamp(0.45rem, 1.5vw, 0.65rem);
    color: var(--muted);
    letter-spacing: 1px;
  }

  .pokeball-icon {
    width: 48px;
    height: 48px;
    display: inline-block;
    animation: spin 4s linear infinite;
    margin-bottom: 0.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── VERSION TABS ── */
  .version-tabs {
    position: relative;
    z-index: 10;
    display: flex;
    justify-content: center;
    gap: 1rem;
    padding: 1.5rem 1rem;
  }

  .version-btn {
    font-family: var(--pixel);
    font-size: 0.55rem;
    padding: 0.75rem 1.5rem;
    border: 3px solid;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
  }

  .version-btn.fr {
    border-color: var(--fr-red);
    color: var(--fr-red);
    background: transparent;
  }
  .version-btn.fr.active, .version-btn.fr:hover {
    background: var(--fr-red);
    color: #fff;
    box-shadow: 0 0 20px rgba(230,57,70,0.5);
  }

  .version-btn.lg {
    border-color: var(--lg-green);
    color: var(--lg-green);
    background: transparent;
  }
  .version-btn.lg.active, .version-btn.lg:hover {
    background: var(--lg-green);
    color: #fff;
    box-shadow: 0 0 20px rgba(45,198,83,0.5);
  }

  /* ── SEARCH ── */
  .search-section {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1rem 1.5rem;
  }

  .search-wrapper {
    position: relative;
  }

  .search-input {
    width: 100%;
    background: #0a0a1a;
    border: 3px solid var(--accent);
    border-radius: 0px;
    color: var(--accent);
    font-family: var(--pixel);
    font-size: 0.55rem;
    font-weight: 400;
    padding: 0.85rem 1rem 0.85rem 3.2rem;
    outline: none;
    letter-spacing: 1px;
    box-shadow: 4px 4px 0 rgba(244,208,63,0.3), inset 0 0 20px rgba(0,0,0,0.5);
    transition: box-shadow 0.2s, border-color 0.2s;
    image-rendering: pixelated;
  }
  .search-input:focus {
    border-color: #fff;
    color: #fff;
    box-shadow: 4px 4px 0 rgba(255,255,255,0.2), inset 0 0 20px rgba(0,0,0,0.5);
  }
  .search-input::placeholder { color: #555577; }

  /* Pixel-art cursor blink on focus */
  .search-input:focus::placeholder { color: transparent; }

  .search-icon {
    position: absolute;
    left: 0.9rem;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    display: flex;
    align-items: center;
  }

  /* Pixel magnifier SVG */
  .search-icon svg {
    width: 22px;
    height: 22px;
    image-rendering: pixelated;
  }

  /* ── POKEMON GRID ── */
  .grid-section {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 1rem 2rem;
  }

  .grid-label {
    font-family: var(--pixel);
    font-size: 0.5rem;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 1rem;
  }

  .pokemon-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 0.6rem;
    max-height: 340px;
    overflow-y: auto;
    padding-right: 0.3rem;
    scrollbar-width: thin;
    scrollbar-color: var(--card-border) transparent;
  }

  .pokemon-grid::-webkit-scrollbar { width: 6px; }
  .pokemon-grid::-webkit-scrollbar-track { background: transparent; }
  .pokemon-grid::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 3px; }

  .poke-card {
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 8px;
    padding: 0.6rem 0.3rem 0.4rem;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .poke-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }

  .poke-card.selected {
    border-color: var(--accent);
    background: rgba(244,208,63,0.1);
    box-shadow: 0 0 15px rgba(244,208,63,0.3);
  }

  .poke-card.unavailable {
    opacity: 0.3;
    cursor: not-allowed;
    filter: grayscale(1);
  }
  .poke-card.unavailable:hover {
    transform: none;
    border-color: var(--card-border);
    box-shadow: none;
  }

  .poke-sprite {
    width: 72px;
    height: 72px;
    object-fit: contain;
    display: block;
    margin: 0 auto 0.3rem;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    transition: transform 0.15s, opacity 0.3s;
    background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
  }
  .poke-card:hover .poke-sprite { transform: scale(1.1); }

  .poke-num {
    font-family: var(--pixel);
    font-size: 0.38rem;
    color: var(--muted);
    margin-bottom: 0.15rem;
  }

  .poke-name {
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  /* TYPE BADGES */
  .type-badges { margin-top: 0.3rem; display: flex; justify-content: center; gap: 2px; flex-wrap: wrap; }
  .type-badge {
    font-size: 0.45rem;
    font-weight: 700;
    padding: 1px 4px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── DETAILS PANEL ── */
  .details-panel {
    position: relative;
    z-index: 10;
    max-width: 900px;
    margin: 0 auto 3rem;
    padding: 0 1rem;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .details-box {
    background: var(--card-bg);
    border: 2px solid var(--card-border);
    border-radius: 12px;
    overflow: hidden;
  }

  .details-header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    padding: 1.5rem;
    border-bottom: 2px solid var(--card-border);
    background: rgba(255,255,255,0.02);
  }

  .details-sprite {
    width: 120px;
    height: 120px;
    object-fit: contain;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6));
  }

  .details-info h2 {
    font-family: var(--pixel);
    font-size: clamp(0.65rem, 2vw, 0.9rem);
    color: var(--accent);
    margin-bottom: 0.4rem;
  }

  .details-info .dex-num {
    font-family: var(--pixel);
    font-size: 0.5rem;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .details-types { display: flex; gap: 0.4rem; }

  .details-body { padding: 1.5rem; }

  .section-title {
    font-family: var(--pixel);
    font-size: 0.5rem;
    color: var(--muted);
    letter-spacing: 2px;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--card-border);
  }

  .no-locations {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
  }
  .no-locations .big { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .no-locations p { font-size: 0.85rem; }

  /* LOCATION TABLE */
  .location-table { width: 100%; border-collapse: collapse; }
  .location-table th {
    font-family: var(--pixel);
    font-size: 0.4rem;
    color: var(--muted);
    text-align: left;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--card-border);
    letter-spacing: 1px;
  }
  .location-table td {
    padding: 0.65rem 0.75rem;
    font-size: 0.85rem;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .location-table tr:last-child td { border-bottom: none; }
  .location-table tr:hover td { background: rgba(255,255,255,0.03); }

  .location-name { color: var(--text); }
  .method-badge {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
  }

  .rate-bar-wrap { display: flex; align-items: center; gap: 0.5rem; }
  .rate-bar {
    height: 6px;
    border-radius: 3px;
    flex: 1;
    background: rgba(255,255,255,0.1);
    overflow: hidden;
    min-width: 60px;
  }
  .rate-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .rate-text { font-size: 0.75rem; color: var(--accent); font-weight: 800; white-space: nowrap; }

  .level-range { color: var(--muted); font-size: 0.8rem; }

  /* EXCLUSIVE BADGE */
  .excl-badge {
    display: inline-block;
    font-size: 0.55rem;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 3px;
    margin-left: 0.4rem;
    vertical-align: middle;
  }
  .excl-fr { background: rgba(230,57,70,0.2); color: var(--fr-red); border: 1px solid var(--fr-red); }
  .excl-lg { background: rgba(45,198,83,0.2); color: var(--lg-green); border: 1px solid var(--lg-green); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    position: relative;
    z-index: 10;
  }
  .empty-state .big-sprite { font-size: 4rem; margin-bottom: 1rem; opacity: 0.3; }
  .empty-state p { font-family: var(--pixel); font-size: 0.5rem; letter-spacing: 2px; line-height: 2; }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 1.5rem;
    color: var(--muted);
    font-size: 0.7rem;
    border-top: 1px solid rgba(255,255,255,0.05);
  }

  /* TYPE COLORS */
  .t-normal    { background:#A8A878; color:#fff; }
  .t-fire      { background:#F08030; color:#fff; }
  .t-water     { background:#6890F0; color:#fff; }
  .t-electric  { background:#F8D030; color:#222; }
  .t-grass     { background:#78C850; color:#fff; }
  .t-ice       { background:#98D8D8; color:#222; }
  .t-fighting  { background:#C03028; color:#fff; }
  .t-poison    { background:#A040A0; color:#fff; }
  .t-ground    { background:#E0C068; color:#222; }
  .t-flying    { background:#A890F0; color:#fff; }
  .t-psychic   { background:#F85888; color:#fff; }
  .t-bug       { background:#A8B820; color:#fff; }
  .t-rock      { background:#B8A038; color:#fff; }
  .t-ghost     { background:#705898; color:#fff; }
  .t-dragon    { background:#7038F8; color:#fff; }
  .t-dark      { background:#705848; color:#fff; }
  .t-steel     { background:#B8B8D0; color:#222; }

  /* METHOD COLORS */
  .m-grass { background:rgba(120,200,80,0.15); color:#78C850; border:1px solid rgba(120,200,80,0.3); }
  .m-surf  { background:rgba(104,144,240,0.15); color:#6890F0; border:1px solid rgba(104,144,240,0.3); }
  .m-fish  { background:rgba(100,180,230,0.15); color:#64B4E6; border:1px solid rgba(100,180,230,0.3); }
  .m-cave  { background:rgba(160,160,160,0.15); color:#aaa; border:1px solid rgba(160,160,160,0.3); }
  .m-gift  { background:rgba(244,208,63,0.15); color:var(--accent); border:1px solid rgba(244,208,63,0.3); }
  .m-trade { background:rgba(200,80,200,0.15); color:#C850C8; border:1px solid rgba(200,80,200,0.3); }
  .m-event { background:rgba(230,57,70,0.15); color:var(--fr-red); border:1px solid rgba(230,57,70,0.3); }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="search-section">

    <span class="search-icon">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">

      </svg>
    </span>
    <input class="search-input" id="searchInput" type="text" placeholder="Buscar por nome ou número..." oninput="filterPokemon()">
  </div>
</div>

<div class="grid-section">
  <div class="grid-label">— SELECIONE UM POKÉMON —</div>
  <div class="pokemon-grid" id="pokemonGrid"></div>
</div>

<div class="details-panel hidden" id="detailsPanel">
  <div class="details-box">
    <div class="details-header">
      <img class="details-sprite" id="detailsSprite" src="" alt="">

    </div>
    <div class="details-body">

      <div id="locationsContent"></div>

  </div>
</div>

<div class="empty-state" id="emptyState">

</div>

<footer>
  Pokémon FireRed &amp; LeafGreen · &nbsp;|&nbsp; &nbsp;|&nbsp; Fan-made, sem afiliação com Nintendo/Game Freak
</footer>

const METHOD_LABEL = {
  grass:"Grama Alta", surf:"Surf", fish:"Pesca",
  cave:"Masmorra / Cave", gift:"Presente / Inicial",
  trade:"Troca / Evolução", event:"Evento / Lendário"
};

const METHOD_CLASS = {
  grass:"m-grass", surf:"m-surf", fish:"m-fish",
  cave:"m-cave", gift:"m-gift", trade:"m-trade", event:"m-event"
};

const RATE_COLOR = {
  grass:"#78C850", surf:"#6890F0", fish:"#64B4E6",
  cave:"#aaaaaa", gift:"#F8D030", trade:"#C050C0", event:"#e63946"
};

let currentVersion = 'fr';
let selectedId = null;
let filteredList = [...POKEMON];

const spriteCache = {};

function setupSpriteWithFallback(imgEl, id) {
  if (spriteCache[id]) {
    imgEl.src = spriteCache[id];
    imgEl.style.opacity = '1';
    return;
  }

  imgEl.style.opacity = '0';

  const isHTTP = location.protocol.startsWith('http');

  if (isHTTP) {
    // Via servidor HTTP: fetch+blob contorna o bloqueio de hotlink do GitHub
    fetch(`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`)
      .then(r => { if (!r.ok) throw 0; return r.blob(); })
      .then(blob => {
        const burl = URL.createObjectURL(blob);
        spriteCache[id] = burl;
        imgEl.src = burl;
        imgEl.style.transition = 'opacity 0.3s';
        imgEl.style.opacity = '1';
      })
      .catch(() => {
        // fallback: pokemon.com
        const purl = `https://assets.pokemon.com/assets/cms2/img/pokedex/full/${String(id).padStart(3,'0')}.png`;
        spriteCache[id] = purl;
        imgEl.src = purl;
        imgEl.style.opacity = '1';
      });
  } else {
    // Aberto como file:// — avisa o usuário
    imgEl.style.opacity = '0.15';
    // Mostra banner de instrução uma vez
    if (!window._bannerShown) {
      window._bannerShown = true;
      const b = document.createElement('div');
      b.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#e63946;color:#fff;font-family:monospace;font-size:12px;padding:10px 16px;z-index:9999;text-align:center;';
      b.innerHTML = '⚠️ Para ver os sprites, abra o arquivo via servidor local: <strong>python3 -m http.server 8080</strong> &nbsp;→&nbsp; acesse <strong>http://localhost:8080</strong> &nbsp;<button onclick="this.parentElement.remove()" style="margin-left:10px;cursor:pointer;background:#fff;color:#e63946;border:none;padding:2px 8px;font-weight:bold">✕</button>';
      document.body.prepend(b);
    }
  }
}

function setVersion(v) {
  currentVersion = v;
  document.querySelectorAll('.version-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.version-btn.${v}`).classList.add('active');
  renderGrid();
  if (selectedId) showDetails(selectedId);
}

function isAvailable(pokemon) {
  return pokemon.locations.some(l => l.version === 'both' || l.version === currentVersion);
}

function filterPokemon() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  filteredList = POKEMON.filter(p =>
    p.name.toLowerCase().includes(q) ||
    String(p.id).padStart(3,'0').includes(q) ||
    String(p.id).includes(q)
  );
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('pokemonGrid');
  grid.innerHTML = '';
  filteredList.forEach(p => {
    const avail = isAvailable(p);
    const card = document.createElement('div');
    card.className = `poke-card${p.id === selectedId ? ' selected' : ''}${!avail ? ' unavailable' : ''}`;
    card.title = avail ? p.name : `${p.name} – não disponível na versão ${currentVersion === 'fr' ? 'Fire Red' : 'Leaf Green'}`;
    card.innerHTML = `
      <img class="poke-sprite" id="spr-${p.id}" alt="${p.name}" loading="lazy">
      <div class="poke-num">#${String(p.id).padStart(3,'0')}</div>
      <div class="poke-name">${p.name}</div>
      <div class="type-badges">${p.types.map(t=>`<span class="type-badge t-${t}">${t}</span>`).join('')}</div>
    `;
    if (avail) card.onclick = () => selectPokemon(p.id);
    grid.appendChild(card);
    setupSpriteWithFallback(document.getElementById(`spr-${p.id}`), p.id);
  });
}

function selectPokemon(id) {
  selectedId = id;
  renderGrid();
  showDetails(id);
}

function showDetails(id) {
  const p = POKEMON.find(x => x.id === id);
  if (!p) return;

  document.getElementById('emptyState').classList.add('hidden');
  const panel = document.getElementById('detailsPanel');
  panel.classList.remove('hidden');

  // Re-trigger animation
  panel.style.animation = 'none';
  panel.offsetHeight;
  panel.style.animation = '';

  const detSprite = document.getElementById('detailsSprite');
  setupSpriteWithFallback(detSprite, p.id);
  document.getElementById('detailsNum').textContent = `#${String(p.id).padStart(3,'0')}`;
  document.getElementById('detailsName').textContent = p.name;
  document.getElementById('detailsTypes').innerHTML =
    p.types.map(t=>`<span class="type-badge t-${t}" style="font-size:0.6rem;padding:3px 8px">${t}</span>`).join('');

  const locs = p.locations.filter(l => l.version === 'both' || l.version === currentVersion);
  const content = document.getElementById('locationsContent');

  if (locs.length === 0) {
    const verName = currentVersion === 'fr' ? '🔴 Fire Red' : '🟢 Leaf Green';
    content.innerHTML = `
      <div class="no-locations">
        <div class="big">😢</div>
        <p>Este Pokémon não está disponível na versão <strong>${verName}</strong>.<br>
        Tente a versão oposta ou obtenha via troca!</p>
      </div>`;
    return;
  }

  let rows = locs.map(l => {
    const excl = l.version !== 'both'
      ? `<span class="excl-badge excl-${l.version}">${l.version === 'fr' ? 'FR' : 'LG'}</span>`
      : '';
    const rateColor = RATE_COLOR[l.method] || '#aaa';
    return `<tr>
      <td class="location-name">${l.area}${excl}</td>
      <td><span class="method-badge ${METHOD_CLASS[l.method]}">${METHOD_LABEL[l.method]}</span></td>
      <td>
        <div class="rate-bar-wrap">
          <div class="rate-bar"><div class="rate-fill" style="width:${l.rate}%;background:${rateColor}"></div></div>
          <span class="rate-text">${l.rate}%</span>
        </div>
      </td>
      <td class="level-range">Nv.${l.levels}</td>
    </tr>`;
  }).join('');

  content.innerHTML = `
    <table class="location-table">
      <thead><tr>
        <th>LOCAL</th>
        <th>MÉTODO</th>
        <th>% APARIÇÃO</th>
        <th>NÍVEL</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// Init
renderGrid();
